services:
  app:
    build:
      context: .
    ports:
      - "${EXTERNAL_PORT:-8080}:8080"
      - "127.0.0.1:${METRICS_PORT:-9090}:9090"
    environment:
      - PORT=8080
      - METRICS_PORT=9090
      - ENV=production
      - GATEWAY_API_KEY=${GATEWAY_API_KEY}
      - RATE_LIMIT_PER_IP=${RATE_LIMIT_PER_IP:-100}
      - RATE_LIMIT_WINDOW_MS=${RATE_LIMIT_WINDOW_MS:-60000}
      - CORS_ORIGINS=${CORS_ORIGINS}
      - REDIS_URL=redis://redis:6379
      - REDIS_KEY_PREFIX=llm_gateway
      - GROQ_API_KEY=${GROQ_API_KEY}
      - CEREBRAS_API_KEY=${CEREBRAS_API_KEY}
      - MISTRAL_API_KEY=${MISTRAL_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - NIM_API_KEY=${NIM_API_KEY}
      - OLLAMA_API_KEY=${OLLAMA_API_KEY}
      - KILO_API_KEY=${KILO_API_KEY}
      - GOOGLE_VERTEX_API_KEY=${GOOGLE_VERTEX_API_KEY}
      - GOOGLE_VERTEX_PROJECT_ID=${GOOGLE_VERTEX_PROJECT_ID}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - frontend
      - backend
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:8080/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    networks:
      - backend
    restart: unless-stopped
    command: redis-server --save 60 1 --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
    internal: true

volumes:
  redis_data:
